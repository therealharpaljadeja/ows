name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.2.3)"
        required: true
        type: string
      commit_sha:
        description: "Commit SHA to release from"
        required: true
        type: string
      branch:
        description: "Branch name to push version bump to"
        required: true
        type: string
        default: "main"

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ inputs.branch }}

      - name: Bump version in source files
        run: |
          V="${{ inputs.tag }}"
          V="${V#v}"
          "$GITHUB_WORKSPACE/scripts/set-version.sh" "$V" --all

      - name: Generate READMEs
        run: ./readme/generate.sh

      - name: Commit version bump
        run: |
          V="${{ inputs.tag }}"
          V="${V#v}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet && exit 0
          git commit -m "chore: bump version to $V"
          git push

  build:
    needs: bump-version
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset: ows-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            asset: ows-linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            asset: ows-darwin-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            asset: ows-darwin-aarch64

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        working-directory: ows

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ inputs.commit_sha }}

      - name: Install Rust toolchain
        run: |
          rustup update stable
          rustup target add ${{ matrix.target }}

      - name: Install zig
        if: contains(matrix.target, 'linux')
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        if: contains(matrix.target, 'linux')
        uses: taiki-e/install-action@94a7388bec5d4c8dd93e3ebf09e0ff448f3f6f4d # v2
        with:
          tool: cargo-zigbuild

      - name: Build (Linux - glibc 2.17+)
        if: contains(matrix.target, 'linux')
        run: cargo zigbuild --release --target ${{ matrix.target }}.2.17

      - name: Build (macOS)
        if: "!contains(matrix.target, 'linux')"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/ows ${{ matrix.asset }}

      - name: Upload artifact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: ${{ matrix.asset }}
          path: ows/${{ matrix.asset }}

  python-wheels:
    needs: bump-version
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ inputs.commit_sha }}

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: |
            3.9
            3.10
            3.11
            3.12
            3.13

      - name: Set version from tag
        run: |
          V="${{ inputs.tag }}"
          V="${V#v}"
          "$GITHUB_WORKSPACE/scripts/set-version.sh" "$V" --python

      - name: Build wheels
        uses: PyO3/maturin-action@04ac600d27cdf7a9a280dadf7147097c42b757ad # v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -i python3.9 python3.10 python3.11 python3.12 python3.13
          sccache: "true"
          manylinux: auto
          working-directory: bindings/python

      - name: Upload wheels
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: python-wheel-${{ matrix.target }}
          path: bindings/python/dist/*.whl

  publish-pypi:
    needs: python-wheels
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          pattern: python-wheel-*
          merge-multiple: true
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # release/v1

  node-addons:
    needs: bump-version
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        working-directory: bindings/node

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ inputs.commit_sha }}

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"

      - name: Install Rust toolchain
        run: |
          rustup update stable
          rustup target add ${{ matrix.target }}

      - name: Install zig
        if: contains(matrix.target, 'linux')
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        if: contains(matrix.target, 'linux')
        uses: taiki-e/install-action@94a7388bec5d4c8dd93e3ebf09e0ff448f3f6f4d # v2
        with:
          tool: cargo-zigbuild

      - name: Set version from tag
        run: |
          V="${{ inputs.tag }}"
          V="${V#v}"
          "$GITHUB_WORKSPACE/scripts/set-version.sh" "$V" --node

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Build native addon (Linux - glibc 2.17+)
        if: contains(matrix.target, 'linux')
        run: npx napi build --platform --release --target ${{ matrix.target }} --zig --zig-abi-suffix 2.17

      - name: Build native addon (macOS)
        if: "!contains(matrix.target, 'linux')"
        run: npx napi build --platform --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: node-addon-${{ matrix.target }}
          path: |
            bindings/node/*.node
            bindings/node/index.js
            bindings/node/index.d.ts

  publish-npm:
    needs: [node-addons, build]
    runs-on: ubuntu-latest
    environment: release

    defaults:
      run:
        working-directory: bindings/node

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ inputs.commit_sha }}

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Set version from tag
        run: |
          V="${{ inputs.tag }}"
          V="${V#v}"
          "$GITHUB_WORKSPACE/scripts/set-version.sh" "$V" --node

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Download all artifacts
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          pattern: node-addon-*
          merge-multiple: true
          path: bindings/node/artifacts

      - name: Move artifacts to platform packages
        run: |
          npx napi artifacts --dir artifacts
          cp artifacts/index.js . 2>/dev/null || true
          cp artifacts/index.d.ts . 2>/dev/null || true

      - name: Verify index.js exists
        run: |
          if [ ! -f index.js ] || [ ! -f index.d.ts ]; then
            echo "ERROR: index.js or index.d.ts missing — npm package would be broken"
            exit 1
          fi

      - name: Download CLI binaries
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          pattern: ows-*
          merge-multiple: true
          path: bindings/node/cli-binaries

      - name: Copy CLI binaries into platform packages
        run: |
          cp cli-binaries/ows-darwin-aarch64 npm/darwin-arm64/ows   && chmod +x npm/darwin-arm64/ows
          cp cli-binaries/ows-darwin-x86_64  npm/darwin-x64/ows     && chmod +x npm/darwin-x64/ows
          cp cli-binaries/ows-linux-x86_64   npm/linux-x64-gnu/ows  && chmod +x npm/linux-x64-gnu/ows
          cp cli-binaries/ows-linux-aarch64  npm/linux-arm64-gnu/ows && chmod +x npm/linux-arm64-gnu/ows

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for dir in npm/*/; do
            output=$(npm publish "$dir" --access public 2>&1) || {
              if echo "$output" | grep -qi "cannot publish over\|previously published"; then
                echo "Already published: $dir — skipping"
              else
                echo "Failed to publish $dir"
                echo "$output"
                exit 1
              fi
            }
          done

      - name: Publish main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --ignore-scripts

  publish-crates:
    needs: bump-version
    runs-on: ubuntu-latest
    environment: release

    defaults:
      run:
        working-directory: ows

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ inputs.commit_sha }}

      - name: Install Rust toolchain
        run: rustup update stable

      - name: Set version from tag
        run: |
          V="${{ inputs.tag }}"
          V="${V#v}"
          "$GITHUB_WORKSPACE/scripts/set-version.sh" "$V" --rust

      - name: Publish ows-core
        run: cargo publish -p ows-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish ows-signer
        run: cargo publish -p ows-signer
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish ows-lib
        run: cargo publish -p ows-lib
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish ows-cli
        run: cargo publish -p ows-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ inputs.commit_sha }}

      - name: Create and push tag
        run: |
          git tag "${{ inputs.tag }}" "${{ inputs.commit_sha }}"
          git push origin "${{ inputs.tag }}"

      - name: Download artifacts
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ inputs.tag }}
          target_commitish: ${{ inputs.commit_sha }}
          generate_release_notes: true
          files: ows-*

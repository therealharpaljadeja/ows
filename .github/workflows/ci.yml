name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Check READMEs are up to date
        run: ./readme/generate.sh --check

  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ows

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        run: rustup update stable

      - name: Cache cargo registry and build
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ows/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('ows/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Verify Cargo.lock is up to date
        run: cargo metadata --locked --format-version 1 > /dev/null

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Run tests
        run: cargo test --workspace

  node:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bindings/node

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"

      - name: Install Rust toolchain
        run: rustup update stable

      - name: Cache cargo registry and build
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            bindings/node/target
          key: ${{ runner.os }}-node-cargo-${{ hashFiles('bindings/node/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-node-cargo-

      - name: Verify Cargo.lock is up to date
        run: cargo metadata --locked --format-version 1 > /dev/null

      - name: Install dependencies
        run: npm install

      - name: Build native addon
        run: npx napi build --platform --release --features fast-kdf

      - name: Run tests
        run: npm test

  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bindings/python

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        run: rustup update stable

      - name: Cache cargo registry and build
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            bindings/python/target
          key: ${{ runner.os }}-python-cargo-${{ hashFiles('bindings/python/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-python-cargo-

      - name: Verify Cargo.lock is up to date
        run: cargo metadata --locked --format-version 1 > /dev/null

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Check READMEs are up to date
        run: ./readme/generate.sh --check

  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ows

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        run: rustup update stable

      - name: Cache cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ows/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('ows/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Run tests
        run: cargo test --workspace

  node:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bindings/node

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install Rust toolchain
        run: rustup update stable

      - name: Cache cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            bindings/node/target
          key: ${{ runner.os }}-node-cargo-${{ hashFiles('bindings/node/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-node-cargo-

      - name: Install dependencies
        run: npm install

      - name: Build native addon
        run: npx napi build --platform --release --features fast-kdf

      - name: Run tests
        run: npm test
